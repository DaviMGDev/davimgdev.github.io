<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D1D21"/>
      <stop offset="100%" style="stop-color:#131316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00DCA5;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00DCA5;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="100" fill="url(#glow)"/>

  <!-- Background -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#27272A" stroke-width="1.5"/>

  <!-- Silhouette head -->
  <ellipse cx="100" cy="82" rx="32" ry="34" fill="#2A2A30"/>

  <!-- Torso -->
  <path d="M 64 170 Q 64 145 82 135 L 118 135 Q 136 145 136 170 Z" fill="#2A2A30"/>

  <!-- Terminal cursor accent dot -->
  <circle cx="100" cy="170" r="3" fill="#00DCA5" opacity="0.6"/>

  <!-- Initials "DMG" -->
  <text x="100" y="178" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" fill="#A1A1AA" letter-spacing="2">DMG</text>

  <!-- Terminal prompt underscore blinking effect -->
  <text x="100" y="25" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00DCA5" opacity="0.4">&gt;_</text>
</svg>
